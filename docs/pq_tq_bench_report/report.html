<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PQ/TQ Test Dashboard</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffaf2;
      --panel-2: #fffdf8;
      --ink: #1f2a30;
      --muted: #6f7d82;
      --line: #d8cec0;
      --accent: #0f766e;
      --good: #2f855a;
      --warn: #b7791f;
      --bad: #c53030;
      --shadow: 0 16px 36px rgba(55, 43, 26, 0.08);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Aptos", "Segoe UI Variable", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.09), transparent 28%),
        radial-gradient(circle at top right, rgba(199, 107, 42, 0.12), transparent 22%),
        linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
    }

    a {
      color: var(--accent);
    }

    .shell {
      width: min(1440px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(15, 118, 110, 0.95), rgba(14, 87, 82, 0.92));
      color: #f6f3ec;
      border-radius: 28px;
      padding: 28px 30px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -40px -60px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.18), transparent 65%);
      pointer-events: none;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .hero p {
      margin: 0;
      max-width: 920px;
      color: rgba(246, 243, 236, 0.86);
      font-size: 15px;
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin: 20px 0 0;
      flex-wrap: wrap;
    }

    .filters,
    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.12);
      color: #f6f3ec;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .pill:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.18);
    }

    .pill.active {
      background: #f6f3ec;
      color: #0e5752;
      border-color: transparent;
    }

    .content {
      display: grid;
      gap: 20px;
      margin-top: 22px;
    }

    .section {
      background: var(--panel);
      border: 1px solid rgba(122, 96, 63, 0.1);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .section h2 {
      margin: 0 0 6px;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .section .sub {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .card .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .card .value {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .card .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .matrix-wrap,
    .table-wrap,
    .chart-frame {
      overflow-x: auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 680px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 11px 12px;
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      background: rgba(255, 255, 255, 0.72);
      position: sticky;
      top: 0;
    }

    td strong {
      display: block;
      font-size: 14px;
    }

    .matrix-cell {
      border-radius: 14px;
      padding: 10px;
      min-width: 140px;
      display: grid;
      gap: 6px;
    }

    .matrix-full {
      background: rgba(47, 133, 90, 0.12);
      color: #1d5d40;
    }

    .matrix-partial {
      background: rgba(183, 121, 31, 0.12);
      color: #8a5a17;
    }

    .matrix-fail {
      background: rgba(197, 48, 48, 0.12);
      color: #9d2a2a;
    }

    .matrix-meta,
    .small {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .dim-grid {
      display: grid;
      gap: 18px;
    }

    .dim-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 251, 243, 0.96));
      padding: 18px;
    }

    .dim-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .dim-head h3 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .dim-head .meta,
    .chart-card .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .chart-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      margin-top: 12px;
    }

    .chart-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 16px;
      padding: 14px;
    }

    .chart-card h4 {
      margin: 0 0 6px;
      font-size: 15px;
      letter-spacing: -0.02em;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #f6f3ec;
      font-size: 12px;
    }

    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .status-true {
      color: var(--good);
      font-weight: 700;
    }

    .status-false {
      color: var(--bad);
      font-weight: 700;
    }

    .coherent {
      color: var(--good);
      font-weight: 600;
    }

    .structured_wrong {
      color: var(--warn);
      font-weight: 600;
    }

    .chaotic,
    .empty {
      color: var(--bad);
      font-weight: 600;
    }

    .source-box {
      background: linear-gradient(135deg, rgba(199, 107, 42, 0.08), rgba(15, 118, 110, 0.06));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .error {
      background: rgba(197, 48, 48, 0.08);
      border: 1px solid rgba(197, 48, 48, 0.18);
      color: #8d2a2a;
      border-radius: 16px;
      padding: 14px;
      line-height: 1.6;
    }

    .error code {
      background: rgba(141, 42, 42, 0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }

    .method-box {
      margin: 0 0 18px;
      background: linear-gradient(135deg, rgba(15, 118, 110, 0.08), rgba(199, 107, 42, 0.06));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .method-box strong {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    .method-box p {
      margin: 0 0 8px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .method-box pre {
      margin: 0;
      padding: 12px;
      overflow-x: auto;
      border-radius: 12px;
      background: rgba(31, 42, 48, 0.95);
      color: #f8f2e8;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "Cascadia Mono", monospace;
    }

    .file-loader {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .file-loader input {
      font: inherit;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .shell {
        width: min(100vw - 20px, 1440px);
        padding-top: 14px;
      }

      .hero {
        padding: 22px 18px;
      }

      .section,
      .dim-card,
      .chart-card {
        padding: 16px;
      }

      table {
        min-width: 600px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <h1>PQ/TQ Test Dashboard</h1>
      <p>
        Interactive view over the consolidated function, performance, PPL, AIME 2026 I Problem 1, and NeedleBench results.
        The page reads <code>report.json</code> from the same directory and renders both tables and charts.
      </p>
      <div class="toolbar">
        <div class="filters" id="dim-filters"></div>
        <div class="legend" id="type-legend"></div>
      </div>
    </header>

    <main class="content" id="app">
      <section class="section">
        <h2>Loading</h2>
        <p class="sub">Reading <code>report.json</code> and building the dashboard.</p>
      </section>
    </main>
  </div>

  <script>
    const TYPE_ORDER = ['f16', 'q8_0', 'q4_0', 'tq4', 'pq4', 'tq3', 'pq3', 'tq2', 'pq2'];
    const DIM_ORDER = ['D64', 'D128', 'D256'];
    const NEEDLE_ORDER = ['32K', '128K'];
    const TYPE_COLORS = {
      f16: '#6c7a89',
      q8_0: '#2b6cb0',
      q4_0: '#c78b18',
      pq2: '#d95f43',
      tq2: '#0f9d8a',
      pq3: '#c2410c',
      tq3: '#0f766e',
      pq4: '#9a3412',
      tq4: '#115e59',
    };

    const state = {
      activeDim: 'ALL',
      data: null,
    };

    const MODEL_PATHS = {
      D64: 'gpt-oss-20b-UD-Q4_K_XL.gguf',
      D128: 'Qwen3-4B-Thinking-2507-UD-Q4_K_XL.gguf',
      D256: 'Qwen3.5-4B-UD-Q4_K_XL.gguf',
    };

    const MODEL_SAMPLING = {
      D64: '--temp 1.0 --top-p 1.0 --top-k 0 --min-p 0.0',
      D128: '--temp 0.6 --top-p 0.95 --top-k 20 --min-p 0.0',
      D256: '--temp 0.6 --top-p 0.95 --top-k 20 --min-p 0.0',
    };

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function numberFmt(value, digits = 2) {
      if (value === null || value === undefined || Number.isNaN(value)) return '—';
      return Number(value).toFixed(digits);
    }

    function pctFmt(value, digits = 2) {
      if (value === null || value === undefined || Number.isNaN(value)) return '—';
      return `${Number(value).toFixed(digits)}%`;
    }

    function yesNo(value) {
      return value ? 'PASS' : 'FAIL';
    }

    function displayType(type) {
      return type === 'f16' ? 'fp16' : type;
    }

    function colorForType(type) {
      const key = type === 'fp16' ? 'f16' : type;
      return TYPE_COLORS[key] || '#64748b';
    }

    function sortByType(rows) {
      return [...rows].sort((a, b) => TYPE_ORDER.indexOf(a.type) - TYPE_ORDER.indexOf(b.type));
    }

    function filterByDims(rows, dims) {
      return rows.filter(row => dims.includes(row.dim));
    }

    function dimsToShow() {
      return state.activeDim === 'ALL' ? DIM_ORDER : [state.activeDim];
    }

    function average(values) {
      const filtered = values.filter(value => value !== null && value !== undefined && !Number.isNaN(value));
      if (!filtered.length) return null;
      return filtered.reduce((sum, value) => sum + value, 0) / filtered.length;
    }

    function card(label, value, meta) {
      return `
        <div class="card">
          <div class="label">${escapeHtml(label)}</div>
          <div class="value">${value}</div>
          <div class="meta">${meta}</div>
        </div>
      `;
    }

    function section(title, subtitle, body) {
      return `
        <section class="section">
          <h2>${escapeHtml(title)}</h2>
          <p class="sub">${subtitle}</p>
          ${body}
        </section>
      `;
    }

    function modelListText() {
      return DIM_ORDER.map(dim => `${dim}: ${MODEL_PATHS[dim]}`).join('\n');
    }

    function samplingListText() {
      return DIM_ORDER.map(dim => `${dim}: ${MODEL_SAMPLING[dim]}`).join('\n');
    }

    function typeRuleText() {
      return 'Type mapping: f16/q8_0/q4_0/pqN => -ctk TYPE -ctv TYPE; tqN => -ctk tqN -ctv pqN';
    }

    function methodBox(title, description, command) {
      return `
        <div class="method-box">
          <strong>${escapeHtml(title)}</strong>
          <p>${description}</p>
          <pre>${escapeHtml(command)}</pre>
        </div>
      `;
    }

    function buildDimensionFilters() {
      const host = document.getElementById('dim-filters');
      host.innerHTML = '';
      ['ALL', ...DIM_ORDER].forEach(dim => {
        const btn = document.createElement('button');
        btn.className = `pill ${state.activeDim === dim ? 'active' : ''}`;
        btn.textContent = dim === 'ALL' ? 'All Dims' : dim;
        btn.addEventListener('click', () => {
          state.activeDim = dim;
          buildDimensionFilters();
          render();
        });
        host.appendChild(btn);
      });
    }

    function buildLegend() {
      const host = document.getElementById('type-legend');
      host.innerHTML = '';
      TYPE_ORDER.forEach(type => {
        const span = document.createElement('span');
        span.className = 'legend-item';
        span.innerHTML = `<span class="swatch" style="background:${colorForType(type)}"></span>${escapeHtml(displayType(type))}`;
        host.appendChild(span);
      });
    }

    function summarySection(dims) {
      const funcRows = filterByDims(state.data.function, dims);
      const benchRows = filterByDims(state.data.bench, dims);
      const pplRows = filterByDims(state.data.ppl, dims);
      const aimeRows = filterByDims(state.data.aime, dims);
      const needleRows = filterByDims(state.data.needle, dims);

      const fullPassCount = funcRows.filter(row => row.all_pass).length;
      const aimePassCount = aimeRows.filter(row => row.pass).length;
      const avgTg = average(benchRows.map(row => row.tg128_tps_vs_q8_pct));
      const avgPpl = average(pplRows.map(row => row.ppl_vs_q8_pct));
      const needle32 = average(needleRows.filter(row => row.needle_size === '32K').map(row => row.needle_score_vs_q8_pct));
      const needle128 = average(needleRows.filter(row => row.needle_size === '128K').map(row => row.needle_score_vs_q8_pct));

      return section(
        'Overview',
        `Current filter: <strong>${escapeHtml(state.activeDim === 'ALL' ? 'All dimensions' : state.activeDim)}</strong>. Summary cards are recalculated from the filtered rows.`,
        `
          <div class="cards">
            ${card('Function Combos', `${fullPassCount}/${funcRows.length}`, 'All-pass combinations in the basic 3-question sanity sweep')}
            ${card('AIME P1 Passes', `${aimePassCount}/${aimeRows.length}`, 'Exact final answer = 277')}
            ${card('Avg TG128', pctFmt(avgTg), 'Decode throughput relative to q8_0')}
            ${card('Avg PPL', pctFmt(avgPpl), 'Perplexity relative to q8_0, lower is better')}
            ${card('Avg Needle 32K', pctFmt(needle32), 'English-only, 6 depth points')}
            ${card('Avg Needle 128K', pctFmt(needle128), 'English-only, 6 depth points')}
          </div>
        `,
      );
    }

    function functionSection(dims) {
      const rows = filterByDims(state.data.function, dims);
      const cellMap = new Map(rows.map(row => [`${row.dim}:${row.type}`, row]));
      const methods = methodBox(
        'Method / Equivalent command',
        'Basic functionality now uses the raw CLI path: llama-cli with FA enabled, fixed seed 123, simple I/O, 4096 context, and --no-jinja. Answer scoring is model-specific: raw gpt-oss output is scored from the extracted final channel; raw Qwen output is cleaned of <think> blocks before answer matching.',
        [
          'Models:',
          modelListText(),
          '',
          'Sampling:',
          samplingListText(),
          '',
          typeRuleText(),
          '',
          'Raw CLI rules:',
          'D64 / gpt-oss: --no-jinja, n=96, parse the <|channel|>final<|message|> segment as the scored answer.',
          'D128 / Qwen3: --no-jinja, append /no_think to the prompt, n=512 to avoid truncating inside <think>.',
          'D256 / Qwen3.5: --no-jinja, n=96, strip <think>...</think> before answer matching.',
          '',
          'Template command (D64 and D256):',
          'llama-cli.exe -m <MODEL> -ngl 999 -fa on -c 4096 -n 96 -p "<QUESTION>" --seed 123 -st --simple-io --no-jinja <CTK/CTV> <SAMPLING>',
          '',
          'Template command (D128 / Qwen3 raw):',
          'llama-cli.exe -m Qwen3-4B-Thinking-2507-UD-Q4_K_XL.gguf -ngl 999 -fa on -c 4096 -n 512 -p "<QUESTION>\\n/no_think" --seed 123 -st --simple-io --no-jinja <CTK/CTV> --temp 0.6 --top-p 0.95 --top-k 20 --min-p 0.0',
          '',
          'Current interpretation note:',
          'D128 pq2 capital_france also fails on the old TheTom branch with turbo2/turbo2 under the same raw/no-jinja method, so it is treated as inherited behavior rather than a migration regression.',
        ].join('\n'),
      );
      return section(
        'Function Matrix',
        'Basic question-answer smoke results. Cells show pass count out of 3 questions plus failed question ids where present.',
        `
          ${methods}
          <div class="matrix-wrap">
            <table>
              <thead>
                <tr>
                  <th>Type</th>
                  ${dims.map(dim => `<th>${escapeHtml(dim)}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${TYPE_ORDER.map(type => `
                  <tr>
                    <td><strong>${escapeHtml(displayType(type))}</strong></td>
                    ${dims.map(dim => {
                      const row = cellMap.get(`${dim}:${type}`);
                      if (!row) return '<td>—</td>';
                      const klass = row.all_pass ? 'matrix-full' : (row.pass_count > 0 ? 'matrix-partial' : 'matrix-fail');
                      const failed = row.failed_questions.length
                        ? `<div class="matrix-meta">Failed: ${escapeHtml(row.failed_questions.join(', '))}</div>`
                        : '<div class="matrix-meta">No failed questions</div>';
                      return `
                        <td>
                          <div class="matrix-cell ${klass}">
                            <strong>${row.pass_count}/${row.total}</strong>
                            <div class="matrix-meta">${row.all_pass ? 'Full pass' : 'Partial failure'}</div>
                            ${failed}
                          </div>
                        </td>
                      `;
                    }).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `,
      );
    }

    function niceUpper(maxValue, floor = 100) {
      const safe = Math.max(floor, maxValue || 0);
      if (safe <= 120) return 120;
      if (safe <= 150) return 150;
      if (safe <= 200) return 200;
      if (safe <= 300) return 300;
      if (safe <= 500) return 500;
      if (safe <= 1000) return 1000;
      return Math.ceil(safe / 250) * 250;
    }

    function buildTicks(min, max, count = 5) {
      const span = max - min;
      if (span <= 0) return [min, max];
      const step = span / (count - 1);
      return Array.from({ length: count }, (_, i) => min + step * i);
    }

    function horizontalBarChart(items, options) {
      const width = 620;
      const left = 96;
      const right = 58;
      const top = 24;
      const bottom = 28;
      const rowH = 28;
      const innerWidth = width - left - right;
      const values = items.map(item => item.value ?? 0);
      const max = options.max ?? niceUpper(Math.max(...values, options.baseline ?? 0));
      const min = options.min ?? 0;
      const height = top + bottom + items.length * rowH;
      const x = value => left + ((value - min) / (max - min)) * innerWidth;
      const ticks = buildTicks(min, max, 5);

      let svg = `<svg viewBox="0 0 ${width} ${height}" width="100%" role="img" aria-label="${escapeHtml(options.title)}">`;
      ticks.forEach(tick => {
        const pos = x(tick);
        svg += `<line x1="${pos}" y1="${top - 10}" x2="${pos}" y2="${height - bottom + 4}" stroke="#d8cec0" stroke-width="1" />`;
        svg += `<text x="${pos}" y="${height - 6}" font-size="11" fill="#6f7d82" text-anchor="middle">${escapeHtml(numberFmt(tick, options.tickDigits ?? 0))}</text>`;
      });
      if (options.baseline !== undefined) {
        const base = x(options.baseline);
        svg += `<line x1="${base}" y1="${top - 10}" x2="${base}" y2="${height - bottom + 4}" stroke="#1f2a30" stroke-width="1.5" stroke-dasharray="4 3" />`;
      }
      items.forEach((item, index) => {
        const y = top + index * rowH;
        const barW = Math.max(0, x(item.value ?? 0) - x(min));
        svg += `<text x="${left - 12}" y="${y + 17}" font-size="12" fill="#1f2a30" text-anchor="end">${escapeHtml(item.label)}</text>`;
        svg += `<rect x="${x(min)}" y="${y + 5}" rx="8" ry="8" width="${barW}" height="16" fill="${escapeHtml(colorForType(item.label))}" opacity="0.9" />`;
        svg += `<text x="${width - 8}" y="${y + 17}" font-size="11" fill="#1f2a30" text-anchor="end">${escapeHtml(options.valueFormatter(item.value, item))}</text>`;
      });
      svg += '</svg>';
      return svg;
    }

    function logTicks(min, max) {
      const baseTicks = [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 1500];
      return baseTicks.filter(value => value >= min && value <= max);
    }

    function lineChart(items, options) {
      const width = 640;
      const height = 260;
      const left = 56;
      const right = 20;
      const top = 20;
      const bottom = options.bottom ?? 38;
      const usableWidth = width - left - right;
      const usableHeight = height - top - bottom;
      const values = items.map(item => item.value).filter(value => value !== null && value !== undefined);
      const minValue = options.min ?? Math.min(...values);
      const maxValue = options.max ?? Math.max(...values);
      const useLog = !!options.useLog;
      const transform = value => useLog ? Math.log10(Math.max(value, 0.1)) : value;
      const scaledMin = transform(minValue);
      const scaledMax = transform(maxValue);
      const range = Math.max(0.001, scaledMax - scaledMin);
      const x = index => left + (usableWidth / Math.max(1, items.length - 1)) * index;
      const y = value => top + usableHeight - ((transform(value) - scaledMin) / range) * usableHeight;
      const ticks = useLog ? logTicks(Math.floor(minValue), Math.ceil(maxValue)) : buildTicks(minValue, maxValue, 5);

      let svg = `<svg viewBox="0 0 ${width} ${height}" width="100%" role="img" aria-label="${escapeHtml(options.title)}">`;
      ticks.forEach(tick => {
        const pos = y(tick);
        svg += `<line x1="${left}" y1="${pos}" x2="${width - right}" y2="${pos}" stroke="#d8cec0" stroke-width="1" />`;
        svg += `<text x="${left - 8}" y="${pos + 4}" font-size="11" fill="#6f7d82" text-anchor="end">${escapeHtml(options.tickFormatter ? options.tickFormatter(tick) : numberFmt(tick, 0))}</text>`;
      });
      if (options.baseline !== undefined && options.baseline >= minValue && options.baseline <= maxValue) {
        const pos = y(options.baseline);
        svg += `<line x1="${left}" y1="${pos}" x2="${width - right}" y2="${pos}" stroke="#1f2a30" stroke-width="1.5" stroke-dasharray="4 3" />`;
      }
      const points = items.map((item, index) => `${x(index)},${y(item.value)}`).join(' ');
      svg += `<polyline fill="none" stroke="${escapeHtml(options.stroke || '#0f766e')}" stroke-width="3" points="${points}" />`;
      items.forEach((item, index) => {
        const cx = x(index);
        const cy = y(item.value);
        const pointColor = colorForType(item.label);
        if (item.pass === true) {
          svg += `<circle cx="${cx}" cy="${cy}" r="7" fill="#ecfdf5" stroke="#15803d" stroke-width="2.5" />`;
          svg += `<circle cx="${cx}" cy="${cy}" r="4.5" fill="${escapeHtml(pointColor)}" stroke="#fff" stroke-width="1.5" />`;
        } else if (item.pass === false) {
          svg += `<circle cx="${cx}" cy="${cy}" r="7" fill="#fff1f2" stroke="#dc2626" stroke-width="2.5" />`;
          svg += `<circle cx="${cx}" cy="${cy}" r="4.5" fill="${escapeHtml(pointColor)}" stroke="#fff" stroke-width="1.5" opacity="0.45" />`;
          svg += `<line x1="${cx - 4}" y1="${cy - 4}" x2="${cx + 4}" y2="${cy + 4}" stroke="#dc2626" stroke-width="2" />`;
          svg += `<line x1="${cx - 4}" y1="${cy + 4}" x2="${cx + 4}" y2="${cy - 4}" stroke="#dc2626" stroke-width="2" />`;
        } else {
          svg += `<circle cx="${cx}" cy="${cy}" r="5" fill="${escapeHtml(pointColor)}" stroke="#fff" stroke-width="2" />`;
        }
        svg += `<text x="${cx}" y="${height - (options.showStatusBelow ? 24 : 12)}" font-size="11" fill="#1f2a30" text-anchor="middle">${escapeHtml(item.label)}</text>`;
        if (options.showStatusBelow && item.pass !== undefined) {
          svg += `<text x="${cx}" y="${height - 8}" font-size="10" fill="${item.pass ? '#15803d' : '#dc2626'}" text-anchor="middle">${item.pass ? 'PASS' : 'FAIL'}</text>`;
        }
        svg += `<text x="${cx}" y="${cy - 12}" font-size="11" fill="#1f2a30" text-anchor="middle">${escapeHtml(options.valueFormatter(item.value))}</text>`;
      });
      svg += '</svg>';
      return svg;
    }

    function performanceSection(dims) {
      const rows = filterByDims(state.data.bench, dims);
      const methods = methodBox(
        'Method / Equivalent command',
        'Performance used llama-bench with FA enabled, 3 repeats, and three workloads: pp512, tg128, and pg32768,256. Percentages in the charts are normalized to q8_0 within the same dimension.',
        [
          'Models:',
          modelListText(),
          '',
          typeRuleText(),
          '',
          'Template command:',
          'llama-bench.exe -m <MODEL> -ngl 999 -fa 1 -ctk <CTK> -ctv <CTV> -p 512 -n 128 -pg 32768,256 -r 3 -o json',
        ].join('\n'),
      );
      const cards = dims.map(dim => {
        const dimRows = sortByType(rows.filter(row => row.dim === dim));
        const charts = [
          { title: 'PP512 vs q8_0', meta: 'Prompt processing throughput percentage', metric: 'pp512_tps_vs_q8_pct', raw: 'pp512_tps' },
          { title: 'TG128 vs q8_0', meta: 'Decode throughput percentage', metric: 'tg128_tps_vs_q8_pct', raw: 'tg128_tps' },
          { title: 'PG32768,256 vs q8_0', meta: 'Long-context mixed prompt+gen throughput percentage', metric: 'pg32768_256_tps_vs_q8_pct', raw: 'pg32768_256_tps' },
        ];
        const chartHtml = charts.map(chart => `
          <div class="chart-card">
            <h4>${escapeHtml(chart.title)}</h4>
            <div class="meta">${escapeHtml(chart.meta)}</div>
            <div class="chart-frame">
              ${horizontalBarChart(
                dimRows.map(row => ({ label: displayType(row.type), value: row[chart.metric], raw: row[chart.raw] })),
                {
                  title: chart.title,
                  baseline: 100,
                  valueFormatter: (value, item) => `${pctFmt(value, 2)} · ${numberFmt(item.raw, 2)} t/s`,
                  tickDigits: 0,
                },
              )}
            </div>
          </div>
        `).join('');

        const table = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Type</th>
                  <th>PP512</th>
                  <th>TG128</th>
                  <th>PG32768,256</th>
                </tr>
              </thead>
              <tbody>
                ${dimRows.map(row => `
                  <tr>
                    <td><strong>${escapeHtml(displayType(row.type))}</strong></td>
                    <td>${numberFmt(row.pp512_tps, 2)} t/s<br><span class="small">${pctFmt(row.pp512_tps_vs_q8_pct, 2)}</span></td>
                    <td>${numberFmt(row.tg128_tps, 2)} t/s<br><span class="small">${pctFmt(row.tg128_tps_vs_q8_pct, 2)}</span></td>
                    <td>${numberFmt(row.pg32768_256_tps, 2)} t/s<br><span class="small">${pctFmt(row.pg32768_256_tps_vs_q8_pct, 2)}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;

        return `
          <div class="dim-card">
            <div class="dim-head">
              <h3>${escapeHtml(dim)}</h3>
              <div class="meta">Relative percentages are normalized to q8_0 within the same dimension.</div>
            </div>
            <div class="chart-grid">${chartHtml}</div>
            ${table}
          </div>
        `;
      }).join('');

      return section(
        'Performance',
        'Bar charts use q8_0 as 100% within each head dimension. Raw TPS values remain visible in the data table.',
        `${methods}<div class="dim-grid">${cards}</div>`,
      );
    }

    function pplSection(dims) {
      const rows = filterByDims(state.data.ppl, dims);
      const methods = methodBox(
        'Method / Equivalent command',
        'Perplexity used llama-perplexity with FA enabled, 512 context length, and wiki.test.raw as input. The chart shows PPL as percentage of q8_0 for easier cross-type comparison.',
        [
          'Models:',
          modelListText(),
          '',
          typeRuleText(),
          '',
          'Template command:',
          'llama-perplexity.exe -m <MODEL> -f wiki.test.raw -ngl 999 -fa on -ctk <CTK> -ctv <CTV> -c 512',
        ].join('\n'),
      );
      const cards = dims.map(dim => {
        const dimRows = sortByType(rows.filter(row => row.dim === dim));
        const maxPct = Math.max(...dimRows.map(row => row.ppl_vs_q8_pct));
        const chart = lineChart(
          dimRows.map(row => ({ label: displayType(row.type), value: row.ppl_vs_q8_pct })),
          {
            title: `${dim} PPL vs q8_0`,
            baseline: 100,
            min: 90,
            max: niceUpper(maxPct, 120),
            valueFormatter: value => pctFmt(value, 1),
            tickFormatter: value => pctFmt(value, 0),
            stroke: '#c76b2a',
          },
        );

        const table = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Type</th>
                  <th>PPL</th>
                  <th>vs q8_0</th>
                </tr>
              </thead>
              <tbody>
                ${dimRows.map(row => `
                  <tr>
                    <td><strong>${escapeHtml(displayType(row.type))}</strong></td>
                    <td>${numberFmt(row.ppl, 4)}</td>
                    <td>${pctFmt(row.ppl_vs_q8_pct, 2)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;

        return `
          <div class="dim-card">
            <div class="dim-head">
              <h3>${escapeHtml(dim)}</h3>
              <div class="meta">Lower is better. The plot uses percentage of q8_0 to keep dimensions comparable.</div>
            </div>
            <div class="chart-card">
              <h4>PPL Curve</h4>
              <div class="meta">q8_0 baseline is marked at 100%.</div>
              <div class="chart-frame">${chart}</div>
            </div>
            ${table}
          </div>
        `;
      }).join('');

      return section(
        'PPL',
        'Perplexity from the 512-token wiki.test.raw sweep. This section emphasizes deviation from q8_0 rather than raw model scale differences.',
        `${methods}<div class="dim-grid">${cards}</div>`,
      );
    }

    function aimeSection(dims) {
      const rows = filterByDims(state.data.aime, dims);
      const methods = methodBox(
        'Method / Equivalent command',
        'AIME used llama-cli with FA enabled, fixed seed 123, simple I/O, and the full AIME 2026 I Problem 1 prompt. The original sweep used 65536 context and 60000 generation tokens. The current report refreshes D64 pq2/tq2/pq3/tq3 with --no-jinja and -n 20000 after removing the temporary raw fallback from server-task.',
        [
          'Models:',
          modelListText(),
          '',
          'Sampling:',
          samplingListText(),
          '',
          typeRuleText(),
          '',
          'Original sweep command:',
          'llama-cli.exe -m <MODEL> -ngl 999 -fa on -c 65536 -n 60000 -p "<AIME_PROMPT>" --seed 123 -st --simple-io -ctk <CTK> -ctv <CTV> <SAMPLING>',
          '',
          'Refreshed D64 pq2/tq2/pq3/tq3 command:',
          'llama-cli.exe -m gpt-oss-20b-UD-Q4_K_XL.gguf -ngl 999 -fa on -c 65536 -n 20000 -p "<AIME_PROMPT>" --seed 123 -st --simple-io -ctk <pq2|tq2|pq3|tq3> -ctv <pq2|pq2|pq3|pq3> --temp 1.0 --top-p 1.0 --top-k 0 --min-p 0.0 --no-jinja',
        ].join('\n'),
      );
      const cards = dims.map(dim => {
        const dimRows = sortByType(rows.filter(row => row.dim === dim));
        const maxPct = Math.max(...dimRows.map(row => row.token_count_vs_q8_pct));
        const chart = lineChart(
          dimRows.map(row => ({ label: displayType(row.type), value: row.token_count_vs_q8_pct, pass: row.pass })),
          {
            title: `${dim} AIME 2026 I Problem 1 token count vs q8_0`,
            baseline: 100,
            min: 4,
            max: niceUpper(maxPct, 200),
            useLog: maxPct > 220,
            bottom: 54,
            showStatusBelow: true,
            valueFormatter: value => pctFmt(value, 0),
            tickFormatter: value => pctFmt(value, 0),
            stroke: '#7c3aed',
          },
        );

        const table = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Type</th>
                  <th>Pass</th>
                  <th>Final</th>
                  <th>Coherence</th>
                  <th>Tokens</th>
                  <th>vs q8_0</th>
                </tr>
              </thead>
              <tbody>
                ${dimRows.map(row => `
                  <tr>
                    <td><strong>${escapeHtml(displayType(row.type))}</strong></td>
                    <td class="${row.pass ? 'status-true' : 'status-false'}">${yesNo(row.pass)}</td>
                    <td>${escapeHtml(row.final_answer ?? '—')}</td>
                    <td class="${escapeHtml(row.coherence)}">${escapeHtml(row.coherence)}</td>
                    <td>${escapeHtml(row.token_count ?? '—')}</td>
                    <td>${pctFmt(row.token_count_vs_q8_pct, 2)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;

        return `
          <div class="dim-card">
            <div class="dim-head">
              <h3>${escapeHtml(dim)}</h3>
              <div class="meta">Problem: AIME 2026 I Problem 1. Final answer must be 277.</div>
            </div>
            <div class="chart-card">
              <h4>Reasoning Length Curve</h4>
              <div class="meta">Token count relative to q8_0. Green-ring points are PASS, red-cross points are FAIL. Log scale is enabled automatically for wide spreads.</div>
              <div class="chart-frame">${chart}</div>
            </div>
            ${table}
          </div>
        `;
      }).join('');

      return section(
        'AIME 2026 I Problem 1',
        'Long reasoning behavior for the AIME prompt. The table combines pass/fail, final extracted answer, coherence tag, and output length.',
        `${methods}<div class="dim-grid">${cards}</div>`,
      );
    }

    function needleSection(dims) {
      const rows = filterByDims(state.data.needle, dims);
      const methods = methodBox(
        'Method / Equivalent command',
        'NeedleBench used the custom Python runner over llama-server. Final methodology was English-only, 6 depth points (0/20/40/60/80/100), sizes 32K and 128K, with model-specific no-thinking constraints. Qwen3 used /no_think in the prompt; Qwen3.5 used enable_thinking=false; gpt-oss used its stop-thinking suffix.',
        [
          'Runner command:',
          'python temp/run_full_pqtq_suite.py --phases needle --outdir temp/<TIMESTAMP>_full_suite_needle',
          '',
          'Underlying server template:',
          'llama-server.exe -m <MODEL> -ngl 999 -c <32768|131072> -fa on -ctk <CTK> -ctv <CTV> -np 1 --threads-http 4 --host 127.0.0.1 --port <PORT> --reasoning off --reasoning-budget 0 --chat-template-kwargs "{\\"enable_thinking\\":false}" --no-webui',
          '',
          'Models:',
          modelListText(),
          '',
          typeRuleText(),
        ].join('\n'),
      );
      const cards = dims.map(dim => {
        const dimRows = rows.filter(row => row.dim === dim);
        const charts = NEEDLE_ORDER.map(size => {
          const sizeRows = sortByType(dimRows.filter(row => row.needle_size === size));
          return `
            <div class="chart-card">
              <h4>${escapeHtml(dim)} ${escapeHtml(size)}</h4>
              <div class="meta">Needle score percentage relative to q8_0 at the same dimension and context size.</div>
              <div class="chart-frame">
                ${horizontalBarChart(
                  sizeRows.map(row => ({ label: displayType(row.type), value: row.needle_score_vs_q8_pct, raw: row.needle_score })),
                  {
                    title: `${dim} ${size} needle`,
                    baseline: 100,
                    valueFormatter: (value, item) => `${pctFmt(value, 2)} · ${numberFmt(item.raw, 4)}`,
                    tickDigits: 0,
                  },
                )}
              </div>
            </div>
          `;
        }).join('');

        const tableRows = TYPE_ORDER.map(type => {
          const row32 = dimRows.find(row => row.type === type && row.needle_size === '32K');
          const row128 = dimRows.find(row => row.type === type && row.needle_size === '128K');
          return `
            <tr>
              <td><strong>${escapeHtml(displayType(type))}</strong></td>
              <td>${row32 ? `${numberFmt(row32.needle_score, 4)}<br><span class="small">${pctFmt(row32.needle_score_vs_q8_pct, 2)}</span>` : '—'}</td>
              <td>${row128 ? `${numberFmt(row128.needle_score, 4)}<br><span class="small">${pctFmt(row128.needle_score_vs_q8_pct, 2)}</span>` : '—'}</td>
            </tr>
          `;
        }).join('');

        return `
          <div class="dim-card">
            <div class="dim-head">
              <h3>${escapeHtml(dim)}</h3>
              <div class="meta">English-only NeedleBench, 6 depth points, with model-specific no-thinking constraints.</div>
            </div>
            <div class="chart-grid">${charts}</div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Type</th>
                    <th>32K</th>
                    <th>128K</th>
                  </tr>
                </thead>
                <tbody>${tableRows}</tbody>
              </table>
            </div>
          </div>
        `;
      }).join('');

      return section(
        'NeedleBench',
        'English-only NeedleBench results using 32K and 128K contexts. Scores are shown both raw and normalized to q8_0.',
        `${methods}<div class="dim-grid">${cards}</div>`,
      );
    }

    function render() {
      const app = document.getElementById('app');
      const dims = dimsToShow();
      app.innerHTML = [
        summarySection(dims),
        functionSection(dims),
        performanceSection(dims),
        pplSection(dims),
        aimeSection(dims),
        needleSection(dims),
      ].join('');
    }

    function showLoadError(error) {
      const app = document.getElementById('app');
      const message = escapeHtml(error && error.message ? error.message : String(error));
      app.innerHTML = `
        <section class="section">
          <h2>Load Failed</h2>
          <div class="error">
            Failed to load <code>report.json</code>: ${message}<br>
            If this page was opened directly from the filesystem, some browsers block <code>fetch()</code> on <code>file://</code> pages.<br>
            Run <code>python -m http.server 8000</code> in this directory and open <code>http://127.0.0.1:8000/report.html</code>, or load the JSON manually below.
            <div class="file-loader">
              <input id="manual-json" type="file" accept=".json,application/json">
              <span class="small">Choose the matching <code>report.json</code> from this directory.</span>
            </div>
          </div>
        </section>
      `;
      const input = document.getElementById('manual-json');
      input.addEventListener('change', async event => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        const text = await file.text();
        state.data = JSON.parse(text);
        buildDimensionFilters();
        buildLegend();
        render();
      });
    }

    async function boot() {
      try {
        const response = await fetch('./report.json', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        state.data = await response.json();
        buildDimensionFilters();
        buildLegend();
        render();
      } catch (error) {
        buildDimensionFilters();
        buildLegend();
        showLoadError(error);
      }
    }

    boot();
  </script>
</body>
</html>
